name: E2E Native C/C++ API Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e-matrix:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64
          - os: macos-latest
            target: macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Build libzcap Native Headers & Libraries
        run: zig build -Doptimize=ReleaseFast

      - name: Build examples (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          SUMMARY="bench_results/incoming/${{ matrix.target }}/summary.txt"
          mkdir -p bench_results/incoming/${{ matrix.target }}
          echo "Compiling C/C++ native mappings with a single command..." | tee "$SUMMARY"

          ./build_examples.sh 2>&1 | tee -a "$SUMMARY"

          ls examples/build 2>&1 | tee -a "$SUMMARY"

      - name: Validate Linux kernel feature fallback path
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          SUMMARY="bench_results/incoming/${{ matrix.target }}/summary.txt"
          mkdir -p bench_results/incoming/${{ matrix.target }}

          if [ ! -f "$SUMMARY" ]; then
            echo "Running Linux feature detection fallback validation tests..." | tee "$SUMMARY"
          else
            echo "Running Linux feature detection fallback validation tests..." | tee -a "$SUMMARY"
          fi

          zig build test -Doptimize=ReleaseFast 2>&1 | tee -a "$SUMMARY"

      - name: Run offline and compatibility smoke tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          SUMMARY="bench_results/incoming/${{ matrix.target }}/summary.txt"
          mkdir -p bench_results/incoming/${{ matrix.target }}
          if [ ! -f "$SUMMARY" ]; then
            echo "Running offline and compatibility examples..." | tee "$SUMMARY"
          else
            echo "Running offline and compatibility examples..." | tee -a "$SUMMARY"
          fi
          
          export ZCAP_LIB_PATH="zig-out/lib"
          export LD_LIBRARY_PATH="$ZCAP_LIB_PATH"
          export DYLD_LIBRARY_PATH="$ZCAP_LIB_PATH"
          
          ./examples/build/03_offline_read_cpp tests/sample.pcap 2>&1 | tee -a "$SUMMARY"
          ./examples/build/07_offline_split_ipv4_cpp tests/sample.pcap 2>&1 | tee -a "$SUMMARY"
          ./examples/build/09_offline_split_transport_cpp tests/sample.pcap 2>&1 | tee -a "$SUMMARY"
          ./examples/build/08_offline_protocol_stats_c tests/sample.pcap 2>&1 | tee -a "$SUMMARY"
          ./examples/build/11_findalldevs_lookupdev_c 2>&1 | tee -a "$SUMMARY"
          ./examples/build/12_nonblocking_stats_c tests/sample.pcap 2>&1 | tee -a "$SUMMARY"
          ./examples/build/15_findalldevs_lookupdev_cpp 2>&1 | tee -a "$SUMMARY"
          ./examples/build/16_nonblocking_stats_cpp tests/sample.pcap 2>&1 | tee -a "$SUMMARY"
          ./examples/build/19_async_native_wait_cpp --offline tests/sample.pcap 18 2>&1 | tee -a "$SUMMARY"

      - name: Compile and Link Examples (Windows / MinGW)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Stop"
          $Summary = "bench_results\incoming\${{ matrix.target }}\summary.txt"
          New-Item -ItemType Directory -Force -Path bench_results\incoming\${{ matrix.target }} | Out-Null
          "Compiling C/C++ native mappings with a single command..." | Tee-Object -FilePath $Summary

          $CMAKE_ARGS = @(
            "-S", "examples",
            "-B", "examples/build",
            "-DLIBZCAP_ROOT=$((Get-Location).Path)",
            "-DLIBZCAP_BUILD_DIR=$((Get-Location).Path)\\zig-out",
            "-DCMAKE_C_COMPILER=gcc",
            "-DCMAKE_CXX_COMPILER=g++"
          )

          if (Get-Command mingw32-make -ErrorAction SilentlyContinue) {
              cmake -G "MinGW Makefiles" @CMAKE_ARGS 2>&1 | Tee-Object -FilePath $Summary -Append
          } else {
              cmake @CMAKE_ARGS 2>&1 | Tee-Object -FilePath $Summary -Append
          }

          cmake --build examples/build 2>&1 | Tee-Object -FilePath $Summary -Append

          "Running offline/native compatibility smoke checks..." | Tee-Object -FilePath $Summary -Append

          $zcapCandidates = @(
            "zig-out\\bin\\zcap.dll",
            "zig-out\\bin\\libzcap.dll",
            "zig-out\\lib\\zcap.dll",
            "zig-out\\lib\\libzcap.dll"
          )
          $ZCAP_DLL = $null
          foreach ($candidate in $zcapCandidates) {
            if (Test-Path $candidate) {
              $ZCAP_DLL = $candidate
              break
            }
          }
          if (-not $ZCAP_DLL) {
            Get-ChildItem -Recurse -Path zig-out | Select-Object -ExpandProperty FullName
            throw "Could not locate zcap.dll in zig-out."
          }
          Copy-Item -Path $ZCAP_DLL -Destination "examples\\build" -Force
          $env:PATH = "$(Get-Location)\\examples\\build;$env:PATH"

          .\examples\build\03_offline_read_cpp.exe tests\sample.pcap 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\07_offline_split_ipv4_cpp.exe tests\sample.pcap 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\09_offline_split_transport_cpp.exe tests\sample.pcap 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\08_offline_protocol_stats_c.exe tests\sample.pcap 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\11_findalldevs_lookupdev_c.exe 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\12_nonblocking_stats_c.exe tests\sample.pcap 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\15_findalldevs_lookupdev_cpp.exe 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\16_nonblocking_stats_cpp.exe tests\sample.pcap 2>&1 | Tee-Object -FilePath $Summary -Append
          .\examples\build\19_async_native_wait_cpp.exe --offline tests\sample.pcap 18 2>&1 | Tee-Object -FilePath $Summary -Append

      - name: Upload Telemetry Logs
        uses: actions/upload-artifact@v4
        with:
          name: e2e-telemetry-${{ matrix.target }}
          path: bench_results/incoming/${{ matrix.target }}
          if-no-files-found: error
