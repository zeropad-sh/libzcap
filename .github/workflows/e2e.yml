name: E2E Native C/C++ API Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e-matrix:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64
          - os: macos-latest
            target: macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.2

      - name: Build libzcap Native Headers & Libraries
        run: zig build -Doptimize=ReleaseFast

      - name: Build examples (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bench_results/incoming/${{ matrix.target }}
          echo "Compiling C/C++ native mappings with a single command..." > bench_results/incoming/${{ matrix.target }}/summary.txt

          ./build_examples.sh

          ls examples/build >> bench_results/incoming/${{ matrix.target }}/summary.txt

      - name: Run offline and compatibility smoke tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bench_results/incoming/${{ matrix.target }}
          
          export ZCAP_LIB_PATH="zig-out/lib"
          export LD_LIBRARY_PATH="$ZCAP_LIB_PATH"
          export DYLD_LIBRARY_PATH="$ZCAP_LIB_PATH"
          
          echo "Running offline and compatibility examples..." >> bench_results/incoming/${{ matrix.target }}/summary.txt

          ./examples/build/03_offline_read_cpp tests/sample.pcap >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/07_offline_split_ipv4_cpp tests/sample.pcap >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/09_offline_split_transport_cpp tests/sample.pcap >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/08_offline_protocol_stats_c tests/sample.pcap >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/11_findalldevs_lookupdev_c >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/12_nonblocking_stats_c tests/sample.pcap >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/15_findalldevs_lookupdev_cpp >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1
          ./examples/build/16_nonblocking_stats_cpp tests/sample.pcap >> bench_results/incoming/${{ matrix.target }}/summary.txt 2>&1

      - name: Compile and Link Examples (Windows / MinGW)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path bench_results\incoming\${{ matrix.target }} | Out-Null
          Set-Content -Path bench_results\incoming\${{ matrix.target }}\summary.txt -Value "Compiling C/C++ native mappings..."

          $CMAKE_ARGS = @(
            "-S", "examples",
            "-B", "examples/build",
            "-DLIBZCAP_ROOT=$((Get-Location).Path)",
            "-DLIBZCAP_BUILD_DIR=$((Get-Location).Path)\\zig-out\\lib",
            "-DCMAKE_C_COMPILER=gcc",
            "-DCMAKE_CXX_COMPILER=g++"
          )

          if (Get-Command mingw32-make -ErrorAction SilentlyContinue) {
              cmake -G "MinGW Makefiles" @CMAKE_ARGS
          } else {
              cmake @CMAKE_ARGS
          }

          cmake --build examples/build

          echo "Running offline/native compatibility smoke checks..." >> bench_results\incoming\${{ matrix.target }}\summary.txt

          $ZCAP_DLL = "zig-out\\bin\\zcap.dll"
          if (-not (Test-Path $ZCAP_DLL)) {
            if (Test-Path "zig-out\\lib\\zcap.dll") {
              $ZCAP_DLL = "zig-out\\lib\\zcap.dll"
            } elseif (Test-Path "zig-out\\bin\\libzcap.dll") {
              $ZCAP_DLL = "zig-out\\bin\\libzcap.dll"
            } elseif (Test-Path "zig-out\\lib\\libzcap.dll") {
              $ZCAP_DLL = "zig-out\\lib\\libzcap.dll"
            } else {
              Get-ChildItem -Recurse -Path zig-out | Select-Object -ExpandProperty FullName
              throw "Could not locate zcap.dll in zig-out."
            }
          }
          Copy-Item -Path $ZCAP_DLL -Destination "examples\\build" -Force
          $env:PATH = "$(Get-Location)\\examples\\build;$env:PATH"

          .\examples\build\03_offline_read_cpp.exe tests\sample.pcap >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\07_offline_split_ipv4_cpp.exe tests\sample.pcap >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\09_offline_split_transport_cpp.exe tests\sample.pcap >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\08_offline_protocol_stats_c.exe tests\sample.pcap >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\11_findalldevs_lookupdev_c.exe >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\12_nonblocking_stats_c.exe tests\sample.pcap >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\15_findalldevs_lookupdev_cpp.exe >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1
          .\examples\build\16_nonblocking_stats_cpp.exe tests\sample.pcap >> bench_results\incoming\${{ matrix.target }}\summary.txt 2>&1

      - name: Upload Telemetry Logs
        uses: actions/upload-artifact@v4
        with:
          name: e2e-telemetry-${{ matrix.target }}
          path: bench_results/incoming/${{ matrix.target }}
          if-no-files-found: error
